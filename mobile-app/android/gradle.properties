# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE will override settings here.

org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.daemon=false

android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35
android.enablePngCrunchInReleaseBuilds=true

reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
newArchEnabled=false
hermesEnabled=true

expo.gif.enabled=true
expo.webp.enabled=true
expo.webp.animated=false
EX_DEV_CLIENT_NETWORK_INSPECTOR=true
expo.useLegacyPackaging=false

# Release signing values must never be stored in this repository. Supply
# NEXAFLOW_RELEASE_STORE_FILE, NEXAFLOW_RELEASE_KEY_ALIAS,
# NEXAFLOW_RELEASE_STORE_PASSWORD, and NEXAFLOW_RELEASE_KEY_PASSWORD through
# environment variables or the user's ~/.gradle/gradle.properties file.

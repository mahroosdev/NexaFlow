// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '23')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '35')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '35')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.23'

        ndkVersion = "26.1.10909125"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

subprojects { subproject ->
    if (subproject.name == "expo-modules-core") {
        subproject.tasks.withType(JavaCompile).configureEach { task ->
            def variant = task.name
                .replaceFirst('compile', '')
                .replaceFirst('JavaWithJavac', '')
            if (variant) {
                def kotlinClasses = variant.substring(0, 1).toLowerCase() + variant.substring(1)
                task.dependsOn "compile${variant}Kotlin"
                task.doFirst {
                    def kotlinOutput = subproject.file("${subproject.buildDir}/tmp/kotlin-classes/${kotlinClasses}")
                    def kotlinJar = subproject.file("${subproject.buildDir}/tmp/kotlin-classpath-jars/${kotlinClasses}-kotlin-classes.jar")
                    kotlinJar.parentFile.mkdirs()
                    ant.zip(destfile: kotlinJar, basedir: kotlinOutput)
                    task.classpath = (task.classpath ?: subproject.files()) + subproject.files(kotlinJar)
                    task.options.compilerArgs += ["-classpath", task.classpath.asPath]
                }
            }
        }
    }
}
